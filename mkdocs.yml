site_name: Konflux Cookbook
site_description: Guides and tools for production-ready builds on Konflux
repo_url: https://github.com/ckhordiasma/konflux-cookbook
repo_name: ckhordiasma/konflux-cookbook
edit_uri: edit/main/guides/

theme:
  name: material
  custom_dir: .github/theme
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - toc.integrate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true

docs_dir: guides
hooks:
  - .github/hooks/rewrite_links.py

nav:
  - Home: index.md
  - Guides:
      - Dockerfile Productization: dockerfile-productization.md
      - Hermeto Prefetch: hermeto-prefetch.md
      - Hermeto Python: hermeto-python.md
      - Check Payload (FIPS): check-payload.md
      - Beaker VM: beaker-vm.md
      - Deploying to Konflux: deploying-to-konflux.md
      - Create PR Pipeline: create-pr-pipeline.md
      - Conforma: conforma.md
